    <line x1="76" y1="26" x2="68" y2="16" stroke="#B7E4C7" stroke-width="2.5" stroke-linecap="round" opacity="0.70"/>
    <line x1="76" y1="26" x2="84" y2="16" stroke="#B7E4C7" stroke-width="2.5" stroke-linecap="round" opacity="0.70"/>

    <line x1="76" y1="54" x2="76" y2="176" stroke="rgba(216,243,220,0.95)" stroke-width="22" stroke-linecap="round"/>
    <path d="M 76 54 A 48 43 0 0 1 76 140" fill="none" stroke="rgba(216,243,220,0.95)" stroke-width="22" stroke-linecap="round"/>
