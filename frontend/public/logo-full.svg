    <rect width="200" height="90"  rx="44" fill="url(#shine2)"/>
    <rect x="2" y="2" width="196" height="196" rx="42" fill="none" stroke="#52B788" stroke-width="1.5" opacity="0.35"/>
    <rect x="7" y="7" width="186" height="186" rx="38"  fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

    <line x1="76" y1="56" x2="76" y2="26" stroke="rgba(216,243,220,0.68)" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="63" cy="44" rx="6.5" ry="11.5" fill="url(#grn2)" transform="rotate(27 63 44)" opacity="0.82"/>
    <ellipse cx="65" cy="32" rx="6"   ry="10"   fill="url(#grn2)" transform="rotate(22 65 32)" opacity="0.91"/>
    <ellipse cx="89" cy="40" rx="6.5" ry="11.5" fill="url(#grn2)" transform="rotate(-27 89 40)" opacity="0.82"/>
