<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP Padaria</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-grande">🥖</div>
                <h1>PADARIA</h1>
                <p>Sistema de Gestão</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-grupo">
                    <label for="username">👤 Usuário</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Digite seu usuário"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="input-grupo">
                    <label for="senha">🔐 Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div id="mensagemErro" class="mensagem-erro" style="display: none;">
                    ⚠️ Usuário ou senha incorretos
                </div>

                <button type="submit" class="btn-entrar">
                    🔓 ENTRAR
                </button>
            </form>

            <div class="login-footer">
                <p>👨‍💼 Admin: <strong>admin</strong> | Senha: <strong>1234</strong></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const senha = document.getElementById('senha').value;
            const mensagemErro = document.getElementById('mensagemErro');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, senha })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    mensagemErro.textContent = '⚠️ ' + (data.erro || 'Usuário ou senha incorretos');
                    mensagemErro.style.display = 'block';
                }
            } catch (erro) {
                mensagemErro.textContent = '⚠️ Erro de conexão. Tente novamente.';
                mensagemErro.style.display = 'block';
            }
        });

        // Limpa erro ao digitar
        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('mensagemErro').style.display = 'none';
        });
        document.getElementById('senha').addEventListener('input', () => {
            document.getElementById('mensagemErro').style.display = 'none';
        });
    </script>
</body>
</html>
