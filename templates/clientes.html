<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🥖</div>
                <h1>PADARIA</h1>
                <div class="usuario-info">
                    <span class="usuario-avatar" id="usuarioAvatar">👤</span>
                    <div>
                        <div class="usuario-nome" id="usuarioNome">-</div>
                        <div class="usuario-cargo" id="usuarioCargo">-</div>
                    </div>
                </div>
            </div>
            <nav class="menu-nav">
                <a href="/" class="menu-item"><span class="menu-item-icone">📊</span><span>Início</span></a>
                <a href="/pdv" class="menu-item"><span class="menu-item-icone">🛒</span><span>Caixa</span></a>
                <a href="/produtos" class="menu-item"><span class="menu-item-icone">📦</span><span>Produtos</span></a>
                <a href="/estoque" class="menu-item"><span class="menu-item-icone">📋</span><span>Estoque</span></a>
                <a href="/clientes" class="menu-item ativo"><span class="menu-item-icone">👥</span><span>Clientes</span></a>
                <a href="/relatorios" class="menu-item"><span class="menu-item-icone">📈</span><span>Relatórios</span></a>
                <a href="/logout" class="menu-item menu-sair"><span class="menu-item-icone">🚪</span><span>Sair</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-topo">
                <h2>👥 Clientes</h2>
                <button class="botao-grande btn-sucesso" onclick="abrirModalCliente()" style="padding: 12px 25px;">
                    <span class="botao-icone">➕</span> Novo
                </button>
            </header>

            <div style="background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <input type="text" id="filtroNome" placeholder="🔍 Buscar cliente..."
                           style="flex: 1; padding: 15px; border: 2px solid #ecf0f1; border-radius: 12px; font-size: 16px;">
                    <input type="text" id="filtroCpf" placeholder="🔢 CPF"
                           style="width: 200px; padding: 15px; border: 2px solid #ecf0f1; border-radius: 12px; font-size: 16px;">
                </div>

                <table class="tabela-visual">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal Cliente -->
    <div class="modal-overlay" id="modalCliente" style="display: none;">
        <div class="modal-conteudo">
            <div class="modal-titulo">
                <span>👤</span>
                <span id="modalTituloTexto">Novo Cliente</span>
            </div>
            <input type="hidden" id="modalClienteId">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📝 Nome Completo</label>
            <input type="text" id="modalNome" style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">🔢 CPF</label>
            <input type="text" id="modalCpf" placeholder="000.000.000-00" maxlength="14"
                   style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📱 Telefone</label>
            <input type="text" id="modalTelefone" placeholder="(00) 00000-0000"
                   style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📧 Email</label>
            <input type="email" id="modalEmail"
                   style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📍 Endereço</label>
            <textarea id="modalEndereco" rows="2"
                      style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 20px;"></textarea>

            <div class="modal-acoes">
                <button onclick="salvarCliente()" class="botao-grande btn-sucesso" style="flex: 1;">💾 Salvar</button>
                <button onclick="fecharModal()" class="botao-grande btn-perigo" style="flex: 1;">🚫 Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let clientes = [];

        async function carregarUsuario() {
            const response = await fetch('/api/usuario/atual');
            if (response.ok) {
                const u = await response.json();
                document.getElementById('usuarioAvatar').textContent = u.avatar;
                document.getElementById('usuarioNome').textContent = u.nome;
                document.getElementById('usuarioCargo').textContent = u.cargo;
            }
        }
        carregarUsuario();

        async function carregarClientes() {
            const response = await fetch('/api/clientes');
            clientes = await response.json();
            renderizarTabela();
        }
        carregarClientes();

        document.getElementById('filtroNome').addEventListener('input', renderizarTabela);
        document.getElementById('filtroCpf').addEventListener('input', renderizarTabela);

        function renderizarTabela() {
            const filtroNome = document.getElementById('filtroNome').value.toLowerCase();
            const filtroCpf = document.getElementById('filtroCpf').value.replace(/\D/g, '');

            const filtrados = clientes.filter(c => {
                const matchNome = c.nome.toLowerCase().includes(filtroNome);
                const matchCpf = !filtroCpf || (c.cpf && c.cpf.replace(/\D/g, '').includes(filtroCpf));
                return matchNome && matchCpf;
            });

            const tbody = document.getElementById('tabelaClientes');
            if (filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;">Nenhum cliente</td></tr>';
                return;
            }

            tbody.innerHTML = filtrados.map(c => `
                <tr>
                    <td><strong>${c.nome}</strong></td>
                    <td>${c.cpf || '-'}</td>
                    <td>${c.telefone || '-'}</td>
                    <td>${c.email || '-'}</td>
                    <td>
                        <button onclick="editarCliente(${c.id})"
                                style="padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; background: #3498db; color: white;">
                            ✏️ Editar
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function abrirModalCliente() {
            document.getElementById('modalCliente').style.display = 'flex';
            document.getElementById('modalTituloTexto').textContent = 'Novo Cliente';
            document.getElementById('modalClienteId').value = '';
            document.getElementById('modalNome').value = '';
            document.getElementById('modalCpf').value = '';
            document.getElementById('modalTelefone').value = '';
            document.getElementById('modalEmail').value = '';
            document.getElementById('modalEndereco').value = '';
        }

        function fecharModal() {
            document.getElementById('modalCliente').style.display = 'none';
        }

        async function editarCliente(id) {
            const response = await fetch(`/api/clientes/${id}`);
            const c = await response.json();
            document.getElementById('modalCliente').style.display = 'flex';
            document.getElementById('modalTituloTexto').textContent = 'Editar Cliente';
            document.getElementById('modalClienteId').value = c.id;
            document.getElementById('modalNome').value = c.nome;
            document.getElementById('modalCpf').value = c.cpf || '';
            document.getElementById('modalTelefone').value = c.telefone || '';
            document.getElementById('modalEmail').value = c.email || '';
            document.getElementById('modalEndereco').value = c.endereco || '';
        }

        async function salvarCliente() {
            const id = document.getElementById('modalClienteId').value;
            const cliente = {
                nome: document.getElementById('modalNome').value,
                cpf: document.getElementById('modalCpf').value.replace(/\D/g, '') || null,
                telefone: document.getElementById('modalTelefone').value,
                email: document.getElementById('modalEmail').value,
                endereco: document.getElementById('modalEndereco').value
            };

            if (!cliente.nome) {
                alert('⚠️ Nome é obrigatório');
                return;
            }

            try {
                const url = id ? `/api/clientes/${id}` : '/api/clientes';
                const method = id ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cliente)
                });
                if (response.ok) {
                    alert('✅ Cliente salvo!');
                    fecharModal();
                    carregarClientes();
                } else {
                    const erro = await response.json();
                    alert('⚠️ ' + erro.erro);
                }
            } catch (erro) {
                alert('❌ Erro');
            }
        }

        document.getElementById('modalCpf').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d)/, '$1.$2');
            v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });
    </script>
</body>
</html>
