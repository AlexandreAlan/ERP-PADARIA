<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🥖</div>
                <h1>PADARIA</h1>
                <div class="usuario-info">
                    <span class="usuario-avatar" id="usuarioAvatar">👤</span>
                    <div>
                        <div class="usuario-nome" id="usuarioNome">-</div>
                        <div class="usuario-cargo" id="usuarioCargo">-</div>
                    </div>
                </div>
            </div>
            <nav class="menu-nav">
                <a href="/" class="menu-item"><span class="menu-item-icone">📊</span><span>Início</span></a>
                <a href="/pdv" class="menu-item"><span class="menu-item-icone">🛒</span><span>Caixa</span></a>
                <a href="/produtos" class="menu-item"><span class="menu-item-icone">📦</span><span>Produtos</span></a>
                <a href="/estoque" class="menu-item"><span class="menu-item-icone">📋</span><span>Estoque</span></a>
                <a href="/clientes" class="menu-item"><span class="menu-item-icone">👥</span><span>Clientes</span></a>
                <a href="/relatorios" class="menu-item ativo"><span class="menu-item-icone">📈</span><span>Relatórios</span></a>
                <a href="/logout" class="menu-item menu-sair"><span class="menu-item-icone">🚪</span><span>Sair</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-topo">
                <h2>📈 Relatórios de Vendas</h2>
            </header>

            <div style="background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <!-- Filtros -->
                <div style="display: flex; gap: 15px; align-items: flex-end; margin-bottom: 25px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 150px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">📅 De</label>
                        <input type="date" id="dataInicio" style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px;">
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">📅 Até</label>
                        <input type="date" id="dataFim" style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px;">
                    </div>
                    <button onclick="carregarRelatorio()" class="botao-grande btn-info" style="padding: 12px 30px;">
                        🔍 Filtrar
                    </button>
                </div>

                <!-- Cards de Resumo -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div style="background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 25px; color: white;">
                        <div style="font-size: 40px; margin-bottom: 10px;">💰</div>
                        <div style="font-size: 14px; opacity: 0.9;">Total Vendas</div>
                        <div style="font-size: 28px; font-weight: 700;" id="relTotalVendas">R$ 0,00</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #f093fb, #f5576c); border-radius: 16px; padding: 25px; color: white;">
                        <div style="font-size: 40px; margin-bottom: 10px;">🛒</div>
                        <div style="font-size: 14px; opacity: 0.9;">Qtd. Vendas</div>
                        <div style="font-size: 28px; font-weight: 700;" id="relQtdVendas">0</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #4facfe, #00f2fe); border-radius: 16px; padding: 25px; color: white;">
                        <div style="font-size: 40px; margin-bottom: 10px;">📊</div>
                        <div style="font-size: 14px; opacity: 0.9;">Ticket Médio</div>
                        <div style="font-size: 28px; font-weight: 700;" id="relTicketMedio">R$ 0,00</div>
                    </div>
                </div>

                <!-- Tabela de Vendas -->
                <h3 style="margin-bottom: 15px; color: #2c3e50;">📋 Vendas do Período</h3>
                <div style="overflow-x: auto;">
                    <table class="tabela-visual">
                        <thead>
                            <tr>
                                <th>Cupom</th>
                                <th>Data/Hora</th>
                                <th>CPF</th>
                                <th>Pagamento</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaVendas"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Define período padrão (7 dias)
        const hoje = new Date();
        const seteDias = new Date(hoje);
        seteDias.setDate(seteDias.getDate() - 7);
        document.getElementById('dataFim').value = hoje.toISOString().split('T')[0];
        document.getElementById('dataInicio').value = seteDias.toISOString().split('T')[0];

        async function carregarUsuario() {
            const response = await fetch('/api/usuario/atual');
            if (response.ok) {
                const u = await response.json();
                document.getElementById('usuarioAvatar').textContent = u.avatar;
                document.getElementById('usuarioNome').textContent = u.nome;
                document.getElementById('usuarioCargo').textContent = u.cargo;
            }
        }
        carregarUsuario();

        async function carregarRelatorio() {
            const dataInicio = document.getElementById('dataInicio').value;
            const dataFim = document.getElementById('dataFim').value;

            try {
                const response = await fetch(`/api/vendas?data_inicio=${dataInicio}&data_fim=${dataFim}`);
                const vendas = await response.json();
                renderizarTabela(vendas);
                atualizarResumo(vendas);
            } catch (erro) {
                console.error('Erro:', erro);
            }
        }
        carregarRelatorio();

        function renderizarTabela(vendas) {
            const tbody = document.getElementById('tabelaVendas');
            if (vendas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px; color: #95a5a6;">Nenhuma venda no período</td></tr>';
                return;
            }

            tbody.innerHTML = vendas.map(v => {
                const dataHora = v.data_venda ? new Date(v.data_venda).toLocaleString('pt-BR') : '-';
                const statusClass = v.status === 'finalizada' ? 'status-ok' : 'status-baixo';
                const statusIcon = v.status === 'finalizada' ? '✅' : '🚫';

                return `
                    <tr>
                        <td><strong>${v.codigo_venda}</strong></td>
                        <td>${dataHora}</td>
                        <td>${v.cpf_cliente || '-'}</td>
                        <td>${v.forma_pagamento || '-'}</td>
                        <td style="color: #27ae60; font-weight: 700;">${formatarMoeda(v.total)}</td>
                        <td><span class="status-badge ${statusClass}">${statusIcon} ${v.status}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function atualizarResumo(vendas) {
            const total = vendas.reduce((acc, v) => acc + v.total, 0);
            const qtd = vendas.length;
            const ticket = qtd > 0 ? total / qtd : 0;

            document.getElementById('relTotalVendas').textContent = formatarMoeda(total);
            document.getElementById('relQtdVendas').textContent = qtd;
            document.getElementById('relTicketMedio').textContent = formatarMoeda(ticket);
        }

        function formatarMoeda(v) {
            return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
    </script>
</body>
</html>
