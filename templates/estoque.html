<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🥖</div>
                <h1>PADARIA</h1>
                <div class="usuario-info">
                    <span class="usuario-avatar" id="usuarioAvatar">👤</span>
                    <div>
                        <div class="usuario-nome" id="usuarioNome">-</div>
                        <div class="usuario-cargo" id="usuarioCargo">-</div>
                    </div>
                </div>
            </div>
            <nav class="menu-nav">
                <a href="/" class="menu-item"><span class="menu-item-icone">📊</span><span>Início</span></a>
                <a href="/pdv" class="menu-item"><span class="menu-item-icone">🛒</span><span>Caixa</span></a>
                <a href="/produtos" class="menu-item"><span class="menu-item-icone">📦</span><span>Produtos</span></a>
                <a href="/estoque" class="menu-item ativo"><span class="menu-item-icone">📋</span><span>Estoque</span></a>
                <a href="/clientes" class="menu-item"><span class="menu-item-icone">👥</span><span>Clientes</span></a>
                <a href="/relatorios" class="menu-item"><span class="menu-item-icone">📈</span><span>Relatórios</span></a>
                <a href="/logout" class="menu-item menu-sair"><span class="menu-item-icone">🚪</span><span>Sair</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-topo">
                <h2>📋 Estoque</h2>
            </header>

            <div style="background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
                    <input type="text" id="filtroNome" placeholder="🔍 Buscar..."
                           style="flex: 1; min-width: 200px; padding: 15px; border: 2px solid #ecf0f1; border-radius: 12px; font-size: 16px;">
                    <select id="filtroStatus" style="padding: 15px; border: 2px solid #ecf0f1; border-radius: 12px; font-size: 16px;">
                        <option value="">Todos</option>
                        <option value="baixo">🔴 Estoque Baixo</option>
                        <option value="vencimento">🟡 Vencendo</option>
                        <option value="vencido">🔴 Vencido</option>
                    </select>
                </div>

                <div style="overflow-x: auto;">
                    <table class="tabela-visual">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Código</th>
                                <th>Qtd</th>
                                <th>Preço</th>
                                <th>Validade</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEstoque"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Movimentação -->
    <div class="modal-overlay" id="modalMovimentacao" style="display: none;">
        <div class="modal-conteudo">
            <div class="modal-titulo">
                <span>📋</span> Movimentar Estoque
            </div>
            <input type="hidden" id="modalProdutoId">
            <p id="modalProdutoNome" style="font-size: 18px; margin-bottom: 20px; color: #2c3e50;"></p>

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📥 Tipo</label>
            <select id="modalTipo" style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">
                <option value="entrada">📥 Entrada (Recebimento)</option>
                <option value="saida">📤 Saída (Baixa)</option>
            </select>

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">🔢 Quantidade</label>
            <input type="number" id="modalQuantidade" min="1" value="1"
                   style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📝 Motivo</label>
            <select id="modalMotivo" style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 15px;">
                <option value="Compra">🚚 Compra</option>
                <option value="Ajuste">🔧 Ajuste</option>
                <option value="Perda">❌ Perda/Deterioração</option>
                <option value="Bonificação">🎁 Bonificação</option>
                <option value="Outro">📝 Outro</option>
            </select>

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📝 Observação</label>
            <textarea id="modalObservacao" rows="3"
                      style="width: 100%; padding: 12px; border: 2px solid #ecf0f1; border-radius: 8px; margin-bottom: 20px;"></textarea>

            <div class="modal-acoes">
                <button onclick="confirmarMovimentacao()" class="botao-grande btn-sucesso" style="flex: 1;">✅ Confirmar</button>
                <button onclick="fecharModal()" class="botao-grande btn-perigo" style="flex: 1;">🚫 Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let produtos = [];

        async function carregarUsuario() {
            const response = await fetch('/api/usuario/atual');
            if (response.ok) {
                const u = await response.json();
                document.getElementById('usuarioAvatar').textContent = u.avatar;
                document.getElementById('usuarioNome').textContent = u.nome;
                document.getElementById('usuarioCargo').textContent = u.cargo;
            }
        }
        carregarUsuario();

        async function carregarEstoque() {
            const response = await fetch('/api/produtos');
            produtos = await response.json();
            renderizarTabela();
        }
        carregarEstoque();

        document.getElementById('filtroNome').addEventListener('input', renderizarTabela);
        document.getElementById('filtroStatus').addEventListener('input', renderizarTabela);

        function renderizarTabela() {
            const filtroNome = document.getElementById('filtroNome').value.toLowerCase();
            const filtroStatus = document.getElementById('filtroStatus').value;

            const filtrados = produtos.filter(p => {
                const matchNome = p.nome.toLowerCase().includes(filtroNome);
                let matchStatus = true;
                if (filtroStatus === 'baixo') matchStatus = p.esta_baixo_estoque;
                else if (filtroStatus === 'vencimento') matchStatus = p.esta_proximo_vencimento;
                else if (filtroStatus === 'vencido') matchStatus = p.vencido;
                return matchNome && matchStatus;
            });

            const tbody = document.getElementById('tabelaEstoque');
            if (filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 30px;">Nenhum produto</td></tr>';
                return;
            }

            tbody.innerHTML = filtrados.map(p => {
                let status = '<span class="status-badge status-ok">✅ OK</span>';
                if (p.vencido) status = '<span class="status-badge status-vencido">🔴 Vencido</span>';
                else if (p.esta_proximo_vencimento) status = '<span class="status-badge status-vencimento">🟡 Vence logo</span>';
                else if (p.esta_baixo_estoque) status = '<span class="status-badge status-baixo">🔴 Baixo</span>';

                const validade = p.validade ? new Date(p.validade).toLocaleDateString('pt-BR') : '-';

                return `
                    <tr>
                        <td><strong>${p.nome}</strong></td>
                        <td>${p.codigo_barras}</td>
                        <td style="font-weight: 700; color: ${p.esta_baixo_estoque ? '#e74c3c' : '#2c3e50'}">${p.quantidade} ${p.unidade}</td>
                        <td>${formatarMoeda(p.preco_venda)}</td>
                        <td>${validade}</td>
                        <td>${status}</td>
                        <td>
                            <button onclick="abrirModalMovimentacao(${p.id}, '${p.nome}', ${p.quantidade})"
                                    style="padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; background: #3498db; color: white; font-weight: 600;">
                                📋 Movimentar
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function abrirModalMovimentacao(id, nome, qtd) {
            document.getElementById('modalProdutoId').value = id;
            document.getElementById('modalProdutoNome').textContent = `${nome} (Atual: ${qtd} ${produtos.find(p => p.id === id)?.unidade || 'UN'})`;
            document.getElementById('modalMovimentacao').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalMovimentacao').style.display = 'none';
        }

        async function confirmarMovimentacao() {
            const id = document.getElementById('modalProdutoId').value;
            const tipo = document.getElementById('modalTipo').value;
            const quantidade = parseInt(document.getElementById('modalQuantidade').value);
            const motivo = document.getElementById('modalMotivo').value;
            const observacao = document.getElementById('modalObservacao').value;

            if (quantidade <= 0) {
                alert('⚠️ Quantidade inválida');
                return;
            }

            try {
                const response = await fetch(`/api/produtos/${id}/estoque`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo, quantidade, motivo, observacao })
                });
                if (response.ok) {
                    alert('✅ Movimentação realizada!');
                    fecharModal();
                    carregarEstoque();
                } else {
                    alert('⚠️ Erro ao realizar movimentação');
                }
            } catch (erro) {
                alert('❌ Erro');
            }
        }

        function formatarMoeda(v) {
            return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
    </script>
</body>
</html>
