server {
    listen 80;
    listen [::]:80;
    server_name padaria.morenadoaco.com.br;

    access_log /var/log/nginx/padaria.access.log;
    error_log  /var/log/nginx/padaria.error.log;

    # SPA compilado (Vite). O backend serve /api e /uploads.
    root /var/www/ERP-PADARIA/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    # Arquivos estáticos com hash → cache longo
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8020;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8020;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\. { deny all; }
}
