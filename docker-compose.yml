# =============================================================================
# ERP Padaria — stack multi-tenant (cópia isolada por cliente)
#
# Cada cliente roda como um projeto compose separado, com banco/volumes/rede
# próprios. Os valores vêm de um arquivo de ambiente por cliente.
#
#   morenadoaco (padrão, já no ar):
#     docker compose up -d --build
#
#   novo cliente (ex.: kero):
#     docker compose -p erp-padaria-kero \
#       --env-file deploy/clients/kero.env up -d --build
#
# Os defaults abaixo (${VAR:-padrao}) reproduzem a instância morenadoaco, então
# um `docker compose up` sem env-file continua subindo-a sem alterações.
# =============================================================================

services:
  padaria-db:
    image: postgres:16-alpine
    container_name: ${TENANT_SLUG:-padaria}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - padaria_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - padaria_net

  padaria-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${TENANT_SLUG:-padaria}-backend
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env}
    environment:
      DB_HOST: ${TENANT_SLUG:-padaria}-db
      DB_PORT: 5432
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8020}:8000"
    volumes:
      - padaria_uploads:/app/uploads
      - ./deploy/clients:/app/deploy/clients:ro
    depends_on:
      padaria-db:
        condition: service_healthy
    networks:
      - padaria_net

networks:
  padaria_net:

volumes:
  padaria_pgdata:
  padaria_uploads:
